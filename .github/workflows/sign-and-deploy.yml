name: Sign and Deploy Config

on:
  push:
    branches:
      - main
    paths:
      - 'config.json'

jobs:
  sign-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create private key file
        run: |
          echo "${{ secrets.CONFIG_PRIVATE_KEY }}" > private.pem

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cryptography
        run: pip install cryptography

      - name: Sign config.json
        run: python sign.py

      - name: Commit and push signed config
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add config.sig
          git commit -m "Auto-sign config.json [skip ci]" || echo "No changes to commit"
          git push
