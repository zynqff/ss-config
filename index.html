<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сборник Стихов — Статус</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e8e0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2e2e45;
      border-radius: 20px;
      padding: 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 22px; margin-bottom: 8px; font-weight: 600; }
    .subtitle { color: #9090b0; font-size: 14px; margin-bottom: 30px; }
    .status-badge {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .ok   { background: #1a3a2a; color: #4caf7d; border: 1px solid #2a5a3a; }
    .warn { background: #3a2a1a; color: #ff9800; border: 1px solid #5a3a1a; }
    .countdown {
      background: #252538;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      font-size: 13px;
      color: #9090b0;
    }
    .countdown span {
      display: block;
      font-size: 28px;
      font-weight: 700;
      color: #a080f0;
      margin-top: 6px;
    }
    .message {
      margin-top: 16px;
      font-size: 14px;
      color: #b0a0d0;
      line-height: 1.6;
    }
    .edit-hint { margin-top: 30px; font-size: 12px; color: #504060; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">⏳</div>
    <h1>Сборник Стихов</h1>
    <div class="subtitle">Статус сервера</div>
    <div class="status-badge" id="badge">Загрузка...</div>
    <div id="extra"></div>
    <div class="edit-hint">config.json · GitHub Pages</div>
  </div>

  <script>
    fetch('./config.json?t=' + Date.now())
      .then(r => r.json())
      .then(cfg => {
        const icon  = document.getElementById('icon');
        const badge = document.getElementById('badge');
        const extra = document.getElementById('extra');

        if (cfg.maintenance) {
          icon.textContent  = '🔧';
          badge.textContent = 'Технические работы';
          badge.className   = 'status-badge warn';

          let html = '';
          if (cfg.message) html += `<div class="message">${cfg.message}</div>`;

          if (cfg.maintenance_until) {
            const until = new Date(cfg.maintenance_until);
            html += `<div class="countdown">Окончание<span id="timer">...</span></div>`;
            extra.innerHTML = html;
            function tick() {
              const diff = until - new Date();
              if (diff <= 0) { document.getElementById('timer').textContent = 'Завершаем...'; return; }
              const h = Math.floor(diff / 3600000);
              const m = Math.floor((diff % 3600000) / 60000);
              const s = Math.floor((diff % 60000) / 1000);
              document.getElementById('timer').textContent =
                (h > 0 ? h + ' ч ' : '') + (m > 0 ? m + ' мин ' : '') + s + ' сек';
            }
            tick();
            setInterval(tick, 1000);
          } else {
            extra.innerHTML = html;
          }
        } else {
          icon.textContent  = '✅';
          badge.textContent = 'Всё работает';
          badge.className   = 'status-badge ok';
        }
      })
      .catch(() => {
        document.getElementById('icon').textContent  = '❌';
        document.getElementById('badge').textContent = 'Ошибка загрузки config.json';
        document.getElementById('badge').className   = 'status-badge warn';
      });
  </script>
</body>
</html>
